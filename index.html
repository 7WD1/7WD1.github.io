      },
      {

        title: 'A Domain-Aware Hierarchical Refinement Framework for Event Boundary Localization in Long-Form Sports Videos',

    function highlightAuthor(authors) {
      return authors.replace(
        /(W\.\s*-?\s*D\.\s*Jiang|W\.-D\.\s*Jiang|W.-D\. Jiang)/g,
        '<span class="pub-highlight">$1</span>'
      );
    }

    function buildPubMeta(pub) {
      const parts = [];
      if (pub.vol) parts.push('vol. ' + pub.vol);
      if (pub.no) parts.push('no. ' + pub.no);
      if (pub.pages) parts.push('pp. ' + pub.pages);
      return parts.join(', ');
    }

    function buildPubDate(pub) {
      return [pub.month, pub.year].filter(Boolean).join(' ');
    }

    function createPubCard(pub) {
      let jcrTagHtml = '';
      if (pub.jcr === 'Q1') {
        jcrTagHtml = '<span class="jcr-tag jcr-q1-shimmer">JCR Q1</span>';
      }

      const metaDetail = buildPubMeta(pub);
      const dateStr = buildPubDate(pub);

      let linksHtml = '';
      if (pub.doi) {
        linksHtml += '<a href="' + pub.doi + '" class="pub-link" target="_blank" rel="noopener">Paper Link</a>';
      }
      if (pub.arxiv) {
        linksHtml += '<a href="https://arxiv.org/abs/' + pub.arxiv + '" class="pub-link" target="_blank" rel="noopener">arXiv:' + pub.arxiv + '</a>';
      }

      const typeLabel = { journal: 'Journal', conference: 'Conference' }[pub.type] || '';

      const titleHtml = pub.doi
        ? '<a href="' + pub.doi + '" class="pub-title-link" target="_blank" rel="noopener">' + pub.title + '</a>'
        : pub.title;

      const coverHtml = pub.cover
        ? '<div class="pub-cover"><img src="' + pub.cover + '" alt="' + pub.venue + '"></div>'
        : '';

      return '<div class="pub-card" data-type="' + pub.type + '" data-jcr="' + (pub.jcr || '') + '">' +
        coverHtml +
        '<div class="pub-body">' +
          '<div class="pub-card-header">' +
            '<div class="pub-title">' + titleHtml + '</div>' +
            '<div class="pub-tags">' +
              '<span class="pub-type-tag pub-type-' + pub.type + '">' + typeLabel + '</span>' +
              jcrTagHtml +
            '</div>' +
          '</div>' +
          '<div class="pub-authors">' + highlightAuthor(pub.authors) + '</div>' +
          '<div class="pub-venue">' + pub.venue + (metaDetail ? ', ' + metaDetail : '') + ', ' + dateStr + (pub.note ? ' <span class="pub-note">(' + pub.note + ')</span>' : '') + '</div>' +
          (pub.if ? '<div class="pub-if">SCI Impact Factor: ' + pub.if + '</div>' : '') +
          (linksHtml ? '<div class="pub-links">' + linksHtml + '</div>' : '') +
        '</div>' +
      '</div>';
    }

    // Render publications after DOM loads
    document.addEventListener('DOMContentLoaded', function() {
      const pubList = document.getElementById('pub-list');
      if (pubList) {
        pubList.innerHTML = publications.map(createPubCard).join('');
      }

      // Search
      const searchInput = document.getElementById('pub-search-input');
      let currentFilter = 'all';
      let searchQuery = '';

      function applyFilters() {
        const cards = pubList.querySelectorAll('.pub-card');
        cards.forEach(function(card) {
          const type = card.getAttribute('data-type');
          const cardText = card.textContent.toLowerCase();
          let showByType = currentFilter === 'all' || type === currentFilter;
          let showBySearch = !searchQuery || cardText.includes(searchQuery.toLowerCase());
          card.style.display = (showByType && showBySearch) ? '' : 'none';
        });
      }

      if (searchInput) {
        searchInput.addEventListener('input', function() {
          searchQuery = searchInput.value.trim();
          applyFilters();
        });
      }

      const filterBtns = document.querySelectorAll('.filter-btn');
      filterBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
          filterBtns.forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          currentFilter = btn.getAttribute('data-filter');
          applyFilters();
        });
      });
    });
    </script>
